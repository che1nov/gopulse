version: 2

builds:
  - id: gopulse
    main: ./cmd/gopulse
    binary: gopulse
    ldflags:
      - -s -w -X github.com/che1nov/gopulse/internal/app.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
